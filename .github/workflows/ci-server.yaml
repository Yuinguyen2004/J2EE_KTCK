name: CI-server

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'server/**'

defaults:
  run:
    working-directory: server

jobs:
  Build:
    name: Run build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean install -DskipTests --no-transfer-progress

  Lint:
    name: Run lint
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check --no-transfer-progress
