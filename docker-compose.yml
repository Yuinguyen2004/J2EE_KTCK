services:
  postgres:
    image: postgres:16-alpine
    container_name: billiard-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: billiard_shop
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d billiard_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billiard-shop-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/billiard_shop
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: billiard-shop
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      FRONTEND_BASE_URL: http://localhost
      JWT_REFRESH_COOKIE_SECURE: "false"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE: openid,email,profile
    expose:
      - "8080"

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: billiard-shop-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:8080"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres-data:
