spring:
  datasource:
    url: jdbc:h2:mem:billiard_shop;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  mail:
    host: localhost
    port: 1025

app:
  security:
    jwt:
      # Test profile should boot without relying on developer shell env vars.
      secret: test-secret-value-with-at-least-32-chars
